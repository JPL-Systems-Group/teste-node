name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            echo "Lockfile não encontrado; usando npm install como fallback"
            npm install
          fi

      - name: Run tests with coverage
        run: npm test | tee test-output.log

      - name: Enforce 85% coverage
        run: |
          node -e "const fs=require('fs');const txt=fs.readFileSync('test-output.log','utf8');const m=txt.match(/all files\s+\|\s+([0-9.]+)\s+\|\s+([0-9.]+)\s+\|\s+([0-9.]+)\s+\|/);if(!m){console.error('coverage summary not found');process.exit(1)};const [lines,branches,funcs]=[+m[1],+m[2],+m[3]];if([lines,branches,funcs].some(v=>v<85)){console.error(`coverage below 85% (lines=${lines}, branches=${branches}, funcs=${funcs})`);process.exit(1)};console.log(`coverage gate passed (lines=${lines}, branches=${branches}, funcs=${funcs})`)"
